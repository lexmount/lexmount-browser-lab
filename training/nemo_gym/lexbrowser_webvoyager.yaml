lexbrowser_webvoyager:
  responses_api_agents:
    verifiers_agent:
      entrypoint: app.py
      domain: agent
      description: WebVoyager-no-anti-bot with Lexmount Browser as the Chrome/CDP backend.
      value: Train browser navigation with the upstream BrowserEnv task and reward contract.
      model_server:
        type: responses_api_models
        name: policy_model
      # API alias only: vLLM serves Qwen3-1.7B under this legacy OpenAI name so
      # Stagehand uses Chat Completions instead of the unsupported Responses API.
      model_name: gpt-4o
      vf_env_id: lexbrowser-webvoyager-no-anti-bot
      vf_env_args:
        mode: dom
        # This is the real Verifiers/agent tool-turn limit.  It is deliberately
        # separate from grpo.max_num_steps (optimizer updates).
        max_turns: 8
        judge_model: glm-5.2
        stagehand_model: openai/glm-5.2
        policy_model: gpt-4o
        proxy_model_to_stagehand: true
        browser_mode: normal
        official_proxy: false
        # A real-site Stagehand navigate can exceed its fixed 15s DOM-ready
        # wait under a 20-session burst.  Eight parallel Lexmount sessions
        # match the proven Stage-1 setting and keep the 64 rollout group
        # stable by scheduling it in waves.
        max_concurrent_sessions: 8
        stagehand_ready_timeout_s: 90.0
        # Bound one real-site episode so a hung page cannot stall a GRPO group.
        per_tool_timeout_s: 25.0
        episode_timeout_s: 180.0
        max_repeated_tool_calls: 3
      group_size: 1
      max_concurrent_generation: 8
      max_concurrent_scoring: 8
      # Short phase-1 episodes: 8 tool turns × 512 generated tokens, plus
      # bounded observations and task context, stay inside the common 8K cap.
      max_tokens: 512
      temperature: 1.0
      top_p: 1.0
