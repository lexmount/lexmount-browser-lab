default:
  agent: browser-use
  data: LexBench-Browser
  model: gpt-5.5
  browser: lexmount

models:
  gpt-5.5:
    model_type: OPENAI
    model_provider: openai
    model_id: $OPENAI_MODEL_ID
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    temperature: 1.0
    dont_force_structured_output: true
    add_schema_to_system_prompt: true

browsers:
  lexmount:
    browser_id: lexmount
    lexmount_browser_mode: normal
    lexmount_official_proxy: false
    lexmount_api_key: $LEXMOUNT_API_KEY
    lexmount_project_id: $LEXMOUNT_PROJECT_ID
    lexmount_base_url: $LEXMOUNT_BASE_URL
    lexmount_proxy_server: $LEXBENCH_LEXMOUNT_PROXY_SERVER
    lexmount_proxy_type: external
    lexmount_proxy_username: $LEXBENCH_LEXMOUNT_PROXY_USERNAME
    lexmount_proxy_password: $LEXBENCH_LEXMOUNT_PROXY_PASSWORD
  local:
    browser_id: local
    headless: false
    local_proxy_server: $LEXBENCH_LOCAL_PROXY_SERVER

agents:
  browser-use:
    use_judge: false
    use_vision: false
    max_steps: 40
    flash_mode: true
    timeout: 600

site_skills:
  enabled: false

eval:
  model: $LEXBENCH_JUDGE_MODEL
  api_key: $LEXBENCH_JUDGE_API_KEY
  base_url: $LEXBENCH_JUDGE_BASE_URL
  temperature: 1.0
  max_tries: 5
  api_max_images: 50
  detail: high
  max_tokens: 4096
