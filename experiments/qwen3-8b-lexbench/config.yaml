default:
  agent: browser-use
  data: LexBench-Browser
  model: qwen3-8B
  browser: lexmount
models:
  qwen3-8B:
    model_type: OPENAI
    model_provider: openai
    model_id: $QWEN_MODEL_ID
    api_key: $QWEN_API_KEY
    base_url: $QWEN_BASE_URL
    frequency_penalty: null
    dont_force_structured_output: false
    add_schema_to_system_prompt: true
browsers:
  lexmount:
    browser_id: lexmount
    lexmount_browser_mode: normal
    lexmount_official_proxy: false
    lexmount_api_key: $LEXMOUNT_API_KEY
    lexmount_project_id: $LEXMOUNT_PROJECT_ID
  local:
    browser_id: local
    headless: false
    local_proxy_server: ''
agents:
  browser-use:
    use_judge: false
    use_vision: false
    max_steps: 40
    flash_mode: true
    timeout: 600
site_skills:
  enabled: false
eval:
  model: $LEXBENCH_JUDGE_MODEL
  api_key: $LEXBENCH_JUDGE_API_KEY
  base_url: $LEXBENCH_JUDGE_BASE_URL
  temperature: 1.0
  max_tries: 5
  api_max_images: 50
  detail: high
  max_tokens: 4096
